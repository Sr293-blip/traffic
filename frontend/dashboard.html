<!DOCTYPE html>
<html>
<head>
<title>Traffic Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
 margin:0;
 font-family:Arial;
 background:#f4f6f9;
}

#map{
 height:60vh;
 width:100%;
 display:flex;
 align-items:center;
 justify-content:center;
 font-size:20px;
 color:white;
 background:linear-gradient(135deg,#1a73e8,#00c6ff);
}

#routeInfo{
 padding:15px;
 background:white;
 text-align:center;
}

#bottomPanel{
 padding:15px;
 text-align:center;
}

button{
 padding:12px 20px;
 border:none;
 border-radius:8px;
 background:#1a73e8;
 color:white;
 font-weight:bold;
 cursor:pointer;
}

#analyticsSection{
 display:none;
 margin-top:20px;
 width:90%;
 max-width:700px;
 margin-left:auto;
 margin-right:auto;
}

canvas{
 background:white;
 padding:15px;
 border-radius:10px;
 box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<!-- Simulated Map Area -->
<div id="map">
 🗺 Route Map Preview
</div>

<!-- Route Details -->
<div id="routeInfo">
 <h3>Route Details</h3>
 <p id="routeText"></p>
</div>

<div id="bottomPanel">
<button onclick="showAnalytics()">🚦 Traffic Analytics</button>

<div id="analyticsSection">
 <h3 id="trafficStatus"></h3>
 <canvas id="trafficChart"></canvas>
</div>

</div>

<script>

// Show entered locations
window.onload = function(){

 const source = localStorage.getItem("source");
 const dest = localStorage.getItem("dest");

 if(!source || !dest){
  alert("Location data missing");
  window.location.href="/route-page";
  return;
 }

 document.getElementById("routeText").innerHTML =
  "<b>From:</b> " + source + "<br><b>To:</b> " + dest;
};


// Traffic Analytics
function showAnalytics(){

 fetch("/analyze-route", {method:"POST"})
 .then(res => res.json())
 .then(data => {

  document.getElementById("analyticsSection").style.display="block";

  document.getElementById("trafficStatus").innerHTML =
   "Traffic Status: <b>" + data.congestion + "</b><br>" + data.suggestion;

  const ctx = document.getElementById("trafficChart");

  new Chart(ctx, {
   type: 'bar',
   data: {
    labels: ['8 AM','10 AM','12 PM','2 PM','4 PM','6 PM'],
    datasets: [{
     label: 'Traffic Density',
     data: [20,45,70,60,80,55],
     borderWidth: 1
    }]
   },
   options: {
    responsive:true,
    scales:{
     y:{beginAtZero:true}
    }
   }
  });

 });
}
<iframe
  width="100%"
  height="350"
  style="border:0"
  loading="lazy"
  allowfullscreen
  src="https://www.google.com/maps?q=Madurai&output=embed">
</iframe>

</script>
<canvas id="trafficChart"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

fetch("/analytics")
.then(res => res.json())
.then(data => {

    new Chart(document.getElementById("trafficChart"), {
        type: "line",
        data: {
            labels: data.times,
            datasets: [{
                label: "Vehicle Count",
                data: data.counts
            }]
        }
    });

});

</script>
</body>
</html>
