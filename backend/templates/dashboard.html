<!DOCTYPE html>
<html>
<head>
<title>Traffic Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
margin:0;
min-height:100vh;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

/* Top Navbar */

.navbar{
width:100%;
padding:15px 40px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.logo{
font-size:20px;
font-weight:600;
}

.menu{
display:flex;
gap:20px;
}

.menu button{
padding:10px 18px;
border:none;
border-radius:6px;
background:linear-gradient(135deg,#ff512f,#dd2476);
color:white;
cursor:pointer;
font-size:14px;
transition:0.3s;
}

.menu button:hover{
transform:scale(1.05);
}

/* Main Container */

.container{
display:flex;
justify-content:center;
margin-top:40px;
}

/* Glass Card */

.card{
width:900px;
padding:30px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(12px);
border-radius:16px;
box-shadow:0 25px 50px rgba(0,0,0,0.4);
text-align:center;
}

/* Map */

.map-container{
width:100%;
height:400px;
border-radius:12px;
overflow:hidden;
box-shadow:0 5px 20px rgba(0,0,0,0.4);
margin-top:20px;
}

.map-container iframe{
width:100%;
height:100%;
border:0;
}

</style>
</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

<div class="logo">🚦 Smart Traffic System</div>

<div class="menu">

<button onclick="goAnalyze()">Analyze Traffic</button>

<button onclick="window.location.href='/traffic-analytics'">
Analytics
</button>

<button onclick="window.location.href='/logout'">
Logout
</button>

</div>

</div>

<!-- DASHBOARD -->

<div class="container">

<div class="card">

<h1>Traffic Route Map</h1>

<div class="map-container" id="map"></div>

</div>

</div>

<script>

window.onload=function(){

const source=localStorage.getItem("source");
const dest=localStorage.getItem("dest");

const frame=document.createElement("iframe");

frame.src="https://www.google.com/maps?q="+source+" to "+dest+"&output=embed";

document.getElementById("map").appendChild(frame);

}

function goAnalyze(){
window.location.href="/analysis-result"
}

</script>

</body>
</html>
