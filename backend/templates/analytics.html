<!DOCTYPE html>
<html>
<head>
<title>Traffic Analytics</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  margin:0;
  min-height:100vh;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  display:flex;
  justify-content:center;
  align-items:center;
}

/* Card */

.card{
  width:85%;
  max-width:900px;
  padding:30px;
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(12px);
  border-radius:16px;
  color:white;
  text-align:center;
  box-shadow:0 20px 40px rgba(0,0,0,0.4);
}

/* Charts container side by side */

.charts-container{
  display:flex;
  justify-content:space-between;
  gap:20px;
  flex-wrap:wrap;
  margin-top:25px;
}

canvas{
  background:white;
  padding:10px;
  border-radius:10px;
  flex:1;
  min-width:300px;
  height:300px;
}

/* Button */

button{
  margin-top:25px;
  padding:12px 25px;
  border:none;
  border-radius:8px;
  background:linear-gradient(135deg,#ff512f,#dd2476);
  color:white;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
}

</style>
</head>

<body>

<div class="card">

<h2>🚦 Traffic Analytics</h2>

<div class="charts-container">
  <canvas id="trafficChart"></canvas>
  <canvas id="congestionChart"></canvas>
</div>

<button onclick="goDashboard()">Back to Dashboard</button>

</div>

<script>

// Time labels
const times = ["8 AM","9 AM","10 AM","11 AM","12 PM","1 PM","2 PM","3 PM"];

// Generate random vehicle data
let vehicleCounts = [];
let congestionLevels = [];

for(let i=0;i<times.length;i++){
  vehicleCounts.push(Math.floor(Math.random()*100)+10);
  congestionLevels.push(Math.floor(Math.random()*10)+1);
}

// Vehicle Count Line Chart
new Chart(document.getElementById("trafficChart"),{
  type:"line",
  data:{
    labels:times,
    datasets:[{
      label:"Vehicle Count",
      data:vehicleCounts,
      borderWidth:2,
      tension:0.4,
      borderColor:"#ff512f",
      backgroundColor:"rgba(255,81,47,0.2)",
      fill:true
    }]
  },
  options:{
    responsive:true,
    maintainAspectRatio:false,
    scales:{
      y:{beginAtZero:true}
    }
  }
});

// Congestion Level Bar Chart
new Chart(document.getElementById("congestionChart"),{
  type:"bar",
  data:{
    labels:times,
    datasets:[{
      label:"Congestion Level",
      data:congestionLevels,
      borderWidth:2,
      backgroundColor:"#42e695",
      borderColor:"#2bb673"
    }]
  },
  options:{
    responsive:true,
    maintainAspectRatio:false,
    scales:{
      y:{beginAtZero:true, max:10}
    }
  }
});

// Back button function
function goDashboard(){
  window.location.href="/dashboard"
}

</script>

</body>
</html>
