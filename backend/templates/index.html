<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Route Selection</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
margin:0;
height:100vh;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
display:flex;
align-items:center;
justify-content:center;
}

.card{
width:360px;
padding:35px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(12px);
border-radius:16px;
box-shadow:0 25px 50px rgba(0,0,0,0.4);
color:#fff;
text-align:center;
}

h2{
margin-bottom:25px;
}

.input-box{
margin-bottom:18px;
}

.input-box input{
width:100%;
padding:12px;
border-radius:8px;
border:none;
outline:none;
font-size:14px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:linear-gradient(135deg,#ff512f,#dd2476);
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

</style>
</head>

<body>

<div class="card">

<h2>🗺 Choose Route</h2>

<div class="input-box">
<input id="source" type="text" placeholder="📍 Current Location">
</div>

<div class="input-box">
<input id="dest" type="text" placeholder="🎯 Destination">
</div>

<button onclick="goNext()">Search Route</button>

</div>

<script>

function goNext(){

const source=document.getElementById("source").value
const dest=document.getElementById("dest").value

if(!source || !dest){
alert("Please enter both locations")
return
}

localStorage.setItem("source",source)
localStorage.setItem("dest",dest)

window.location.href="/dashboard"

}

</script>

</body>
</html>
