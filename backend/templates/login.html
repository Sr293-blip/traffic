<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Traffic Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script>
const params = new URLSearchParams(window.location.search);

if (params.get("signup") === "success") {
    alert("✅ Account created successfully!");
}
</script>
<style>
*{
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
margin:0;
height:100vh;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
display:flex;
align-items:center;
justify-content:center;
}

.card{
width:360px;
padding:35px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(12px);
border-radius:16px;
box-shadow:0 25px 50px rgba(0,0,0,0.4);
color:#fff;
}

h2{
text-align:center;
margin-bottom:25px;
}

.input-box{
margin-bottom:18px;
}

.input-box input{
width:100%;
padding:12px;
border-radius:8px;
border:none;
outline:none;
font-size:14px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:linear-gradient(135deg,#ff512f,#dd2476);
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
}

p{
text-align:center;
margin-top:18px;
font-size:14px;
}

a{
color:#ffd369;
text-decoration:none;
}

.alert{
background:#28a745;
padding:10px;
border-radius:6px;
margin-bottom:15px;
text-align:center;
font-size:14px;
}
</style>

</head>

<body>

<div class="card">

<h2>🚦 Smart Traffic System</h2>

<!-- FLASH MESSAGE -->
{% with messages = get_flashed_messages() %}
{% if messages %}
<div class="alert">
{{ messages[0] }}
</div>
{% endif %}
{% endwith %}

<form action="/login" method="POST">

<div class="input-box">
<input type="text" name="username" placeholder="Username" required>
</div>

<div class="input-box">
<input type="password" name="password" placeholder="Password" required>
</div>

<button type="submit">Login</button>

</form>

<p>New user? <a href="/signup-page">Create an account</a></p>

</div>

</body>
</html>
