<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Account</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    margin:0;
    height:100vh;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    display:flex;
    align-items:center;
    justify-content:center;
}

.card{
    width:380px;
    padding:35px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(12px);
    border-radius:16px;
    box-shadow:0 25px 50px rgba(0,0,0,0.4);
    color:#fff;
    position: relative;
}

h2{
    text-align:center;
    margin-bottom:25px;
}

.input-box{
    margin-bottom:18px;
}

.input-box input{
    width:100%;
    padding:12px;
    border-radius:8px;
    border:none;
    outline:none;
    font-size:14px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:linear-gradient(135deg,#42e695,#3bb2b8);
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
}

p{
    text-align:center;
    margin-top:18px;
    font-size:14px;
}

a{
    color:#ffd369;
    text-decoration:none;
}

/* Success alert */
.alert-success{
    display:none;
    background:#28a745;
    padding:10px;
    border-radius:6px;
    margin-bottom:15px;
    text-align:center;
    font-size:14px;
    font-weight:600;
}
</style>
</head>

<body>

<div class="card">

<h2>📝 Create Account</h2>

<!-- SUCCESS ALERT -->
<div class="alert-success" id="success-msg">
    ✅ Account created successfully! You can now login.
</div>

<form action="/signup" method="POST">

<div class="input-box">
    <input type="text" name="username" placeholder="Username" required>
</div>

<div class="input-box">
    <input type="password" name="password" placeholder="Password" required>
</div>

<div class="input-box">
    <input type="email" name="email" placeholder="Email" required>
</div>

<div class="input-box">
    <input type="tel" name="phone" placeholder="Phone (+1234567890)" required pattern="^\+\d{10,15}$" title="Include country code, e.g. +1234567890">
</div>

<button type="submit">Sign Up</button>

</form>

<p>Already have an account? <a href="/">Login</a></p>

</div>

<script>
    // Show success message if signup successful
    const params = new URLSearchParams(window.location.search);
    if (params.get('signup') === 'success') {
        document.getElementById('success-msg').style.display = 'block';
        // Remove query parameter so message doesn't repeat on refresh
        window.history.replaceState({}, document.title, "/signup-page");
    }
</script>

</body>
</html>
