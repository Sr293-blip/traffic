<!DOCTYPE html>
<html>
<head>
<title>Traffic Analysis Result</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
margin:0;
height:100vh;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
display:flex;
align-items:center;
justify-content:center;
}

.card{
width:420px;
padding:35px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(12px);
border-radius:16px;
box-shadow:0 25px 50px rgba(0,0,0,0.4);
color:white;
text-align:center;
}

h2{
margin-bottom:20px;
}

.alert{
margin-top:15px;
padding:12px;
border-radius:8px;
font-weight:600;
}

.safe{
background:#28a745;
color:white;
}

.warning{
background:#ffc107;
color:black;
}

.danger{
background:#dc3545;
color:white;
}

button{
margin-top:20px;
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:linear-gradient(135deg,#ff512f,#dd2476);
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
}

</style>
</head>

<body>

<div class="card">

<h2>🚦 Traffic Analysis Result</h2>

<div id="result">Analyzing traffic...</div>

<button onclick="goDashboard()">
Back to Dashboard
</button>

</div>

<script>

fetch("/analyze",{
method:"POST"
})
.then(res => res.json())
.then(data => {

let routeSuggestion = "Normal Route Recommended";

/* ROUTE LOGIC */

if(data.prediction === "HIGH"){
routeSuggestion = "Alternate Route Suggested";
localStorage.setItem("alternateRoute","true");
alert("🚨 Heavy Traffic Predicted! Alternate Route Recommended");
}
else{
localStorage.setItem("alternateRoute","false");
}

/* TRAFFIC COLOR */

let alertClass="safe";
if(data.congestion==="MEDIUM") alertClass="warning";
if(data.congestion==="HIGH") alertClass="danger";

/* SHOW RESULT */

document.getElementById("result").innerHTML=
`
<div class="alert ${alertClass}">
Traffic Level : ${data.congestion}<br>
Vehicle Count : ${data.vehicle_count}
</div>

<div class="alert safe">
Route Suggestion : ${routeSuggestion}
</div>
`;

})

function goDashboard(){
window.location.href="/dashboard"
}

</script>

</body>
</html>
